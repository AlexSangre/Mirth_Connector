##############################################################################
# Mirth Connector — healthcare-v2 standalone
#
# Self-contained; does NOT require docker-compose.yml or the Gizmo PLC stack.
# Requires healthcare-v2 to be running first (creates the medical-vlan network).
#
# Usage:
#   docker compose -f docker-compose.healthcare-standalone.yml up -d
#
# Mirth admin console: https://<host-ip>:8443  (admin / admin on first start)
# Import channels from: mirth/channels/healthcare/
##############################################################################

services:

  device_exporter:
    container_name: device_exporter
    build:
      context: ./device_exporter
      dockerfile: Dockerfile
    restart: always
    environment:
      VITALS_URL:        "http://10.10.30.12:8000"
      CPAP_URL:          "http://10.10.30.11:8000"
      CRRT_URL:          "http://10.10.30.10:8000"
      INFUSION_PUMP_URL: "http://10.10.30.13:8000"
      OUTPUT_DIR:    /data/plc_readings
      LATEST_DIR:    /data/plc_latest
      POLL_INTERVAL: "30"
      HTTP_TIMEOUT:  "5"
    volumes:
      - plc_data:/data/plc_readings
      - plc_latest:/data/plc_latest
    networks:
      medical-vlan:
        ipv4_address: 10.10.30.25

  mirth-connect:
    container_name: mirth-connect
    image: nextgenhealthcare/connect:4.4.1
    restart: always
    cap_add:
      - NET_ADMIN
    environment:
      DATABASE: derby
      KEYSTORE_STOREPASS: changeit
      KEYSTORE_KEYPASS: changeit
    volumes:
      - plc_data:/data/plc_readings:ro
      - plc_latest:/data/plc_latest:ro
      - hl7_out:/data/hl7_out
      - orders_data:/data/orders
      - mirth_appdata:/opt/connect/appdata
      - ./mirth/channels:/opt/connect/appdata/channel-backups:ro
    ports:
      - "8443:8443"
      - "6661:6661"
    networks:
      medical-vlan:
        ipv4_address: 10.10.30.30
    depends_on:
      - device_exporter

volumes:
  plc_data: {}
  plc_latest: {}
  hl7_out: {}
  orders_data: {}
  mirth_appdata: {}

networks:
  medical-vlan:
    external: true
    name: medical-vlan
