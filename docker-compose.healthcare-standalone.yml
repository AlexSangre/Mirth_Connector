##############################################################################
# Mirth Connector — healthcare-v2 standalone
#
# Self-contained integration bridge for the healthcare-v2 device simulators.
# Requires healthcare-v2 to be running first (creates the medical-vlan network).
#
# Usage:
#   docker compose -f docker-compose.healthcare-standalone.yml up -d
#
# Mirth admin console: https://<host-ip>:8443  (admin / admin on first start)
##############################################################################

services:

  device_exporter:
    container_name: device_exporter
    build:
      context: ./device_exporter
      dockerfile: Dockerfile
    restart: always
    environment:
      VITALS_URL:        "http://10.10.30.12:8000"
      CPAP_URL:          "http://10.10.30.11:8000"
      CRRT_URL:          "http://10.10.30.10:8000"
      INFUSION_PUMP_URL: "http://10.10.30.13:8000"
      OUTPUT_DIR:    /data/snapshots
      POLL_INTERVAL: "30"
      HTTP_TIMEOUT:  "5"
    volumes:
      - snapshots:/data/snapshots
    networks:
      medical-vlan:
        ipv4_address: 10.10.30.25

  mirth-connect:
    container_name: mirth-connect
    image: nextgenhealthcare/connect:4.4.1
    restart: always
    user: root
    cap_add:
      - NET_ADMIN
    environment:
      DATABASE: derby
      KEYSTORE_STOREPASS: changeit
      KEYSTORE_KEYPASS: changeit
    volumes:
      - snapshots:/data/snapshots
      - hl7_out:/data/hl7_out
      - mirth_appdata:/opt/connect/appdata
      - ./mirth/channels/healthcare:/opt/connect/appdata/channel-backups:ro
    ports:
      - "8443:8443"
    networks:
      medical-vlan:
        ipv4_address: 10.10.30.30
    depends_on:
      - device_exporter

  mirth-init:
    container_name: mirth-init
    image: curlimages/curl:latest
    restart: "no"
    environment:
      MIRTH_USER: admin
      MIRTH_PASS: admin
    volumes:
      - ./mirth/channels/healthcare:/channels:ro
      - ./mirth/init-channels.sh:/init-channels.sh:ro
    entrypoint: ["/bin/sh", "/init-channels.sh"]
    networks:
      medical-vlan: {}
    depends_on:
      - mirth-connect

volumes:
  snapshots: {}
  hl7_out: {}
  mirth_appdata: {}

networks:
  medical-vlan:
    external: true
    name: medical-vlan
