 ##############################################################################
# Mirth Connector — add-on services for gizmo-docker-twin-healthcare
#
# Usage (run from the gizmo-docker-twin-healthcare root):
#   docker compose -f docker-compose.yaml -f Mirth_Connector/docker-compose.yml up -d
#
# Or standalone (parent compose must already be running so networks exist):
#   docker compose -f docker-compose.yml up -d
##############################################################################

services:

  # --------------------------------------------------------------------------
  # plc_exporter (10.10.30.19 — level1_plc)
  # Polls all 5 PLCs via Modbus TCP every POLL_INTERVAL seconds and writes:
  #   plc_data volume   → timestamped snapshots (PLCtoOpenEMR channel)
  #   plc_latest volume → latest.json overwritten each tick (VitalSignsAlerts)
  # --------------------------------------------------------------------------
  plc_exporter:
    container_name: plc_exporter
    build:
      context: ./plc_exporter
      dockerfile: Dockerfile
    restart: always
    cap_add:
      - NET_ADMIN
    environment:
      OUTPUT_DIR: /data/plc_readings
      LATEST_DIR: /data/plc_latest
      POLL_INTERVAL: "30"
      MODBUS_TIMEOUT: "5"
    volumes:
      - plc_data:/data/plc_readings
      - plc_latest:/data/plc_latest
    networks:
      level1_plc:
        ipv4_address: 10.10.30.19
    depends_on:
      - plc_signosvitales
      - plc_perfusor
      - plc_cpap
      - plc_tac
      - plc_hospital

  # --------------------------------------------------------------------------
  # order_executor (10.10.30.20 — level1_plc)
  # Watches /data/orders/ for JSON order files from the PerfusorOrders channel.
  # Writes Modbus Holding registers directly to plc_perfusor (10.10.30.14).
  # plc_cerebro reads those registers every 5 s and sends MQTT actuator commands.
  #
  # Full order loop:
  #   OpenEMR → MLLP:6661 → Mirth PerfusorOrders → /data/orders/
  #     → order_executor → Modbus write → plc_perfusor
  #       → plc_cerebro → MQTT → physical perfusor actuator
  # --------------------------------------------------------------------------
  order_executor:
    container_name: order_executor
    build:
      context: ./order_executor
      dockerfile: Dockerfile
    restart: always
    cap_add:
      - NET_ADMIN
    environment:
      ORDERS_DIR: /data/orders
      ERRORS_DIR: /data/orders/errors
      POLL_INTERVAL: "2"
      MODBUS_TIMEOUT: "5"
      PERFUSOR_PLC_IP: "10.10.30.14"
      PERFUSOR_PLC_PORT: "502"
      PERFUSOR_SLAVE_ID: "3"
    volumes:
      - orders_data:/data/orders
    networks:
      level1_plc:
        ipv4_address: 10.10.30.20
    depends_on:
      - plc_perfusor

  # --------------------------------------------------------------------------
  # mirth-connect (10.10.10.14 — level3_operaciones)
  # NextGen Connect 4.4.1 — HL7/FHIR integration engine.
  # Admin console: https://localhost:8443  (admin / admin on first start)
  #
  # Channels to import after first start:
  #   mirth/channels/PLCtoOpenEMR.xml       vital signs JSON → HL7 ORU^R01
  #   mirth/channels/OrthancToOpenEMR.xml   Orthanc DICOM study → HL7 ORU^R01
  #   mirth/channels/VitalSignsAlerts.xml   threshold alerting → HL7 ORU^R01
  #   mirth/channels/PerfusorOrders.xml     MLLP:6661 → perfusor order JSON
  # --------------------------------------------------------------------------
  mirth-connect:
    container_name: mirth-connect
    image: nextgenhealthcare/connect:4.4.1
    restart: always
    cap_add:
      - NET_ADMIN
    environment:
      DATABASE: derby
      KEYSTORE_STOREPASS: changeit
      KEYSTORE_KEYPASS: changeit
    volumes:
      - plc_data:/data/plc_readings:ro
      - plc_latest:/data/plc_latest:ro
      - hl7_out:/data/hl7_out
      - orders_data:/data/orders
      - mirth_appdata:/opt/connect/appdata
      - ./mirth/channels:/opt/connect/appdata/channel-backups:ro
    ports:
      - "8443:8443"     # Mirth Connect administrator (HTTPS)
      - "6661:6661"     # HL7 MLLP listener (PerfusorOrders channel)
    networks:
      level3_operaciones:
        ipv4_address: 10.10.10.14
    depends_on:
      - plc_exporter

volumes:
  plc_data: {}          # Timestamped JSON snapshots (PLCtoOpenEMR reads + deletes)
  plc_latest: {}        # latest.json overwritten each tick (VitalSignsAlerts reads)
  hl7_out: {}           # HL7 output files staged for OpenEMR
  orders_data: {}       # Perfusor orders: Mirth writes, order_executor reads
  mirth_appdata: {}     # Mirth Connect persistent config / Derby DB

networks:
  level1_plc:
    external: true
  level3_operaciones:
    external: true
